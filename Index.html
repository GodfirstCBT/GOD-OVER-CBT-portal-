<!DOCTYPE html>
<html>
<head>
<title>God First CBT Portal</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
<h1>God First CBT Portal</h1>

<form id="loginForm">
<input type="text" id="studentName" placeholder="Enter Name" required>
<input type="text" id="studentID" placeholder="Enter ID" required>

<select id="subject">
<option value="chemistry">Chemistry</option>
<option value="physics">Physics</option>
</select>

<button type="submit">Start Exam</button>
</form>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e){
e.preventDefault();

localStorage.setItem("studentName", document.getElementById("studentName").value);
localStorage.setItem("studentID", document.getElementById("studentID").value);
localStorage.setItem("subject", document.getElementById("subject").value);

window.location.href="exam.html";
});
</script>

</body>
</html>
